## Decisions Made

| ID | Date | Decision | Rationale | Status |
|----|------|---------|-----------|--------|
| D-001 | 2026-04-17 | Use HidLibrary + HID Report 0x90, not WinRT GATT | Apple devices use proprietary HID battery reporting confirmed by WinMagicBattery reverse engineering | active |
| D-002 | 2026-04-22 | worst-state-wins semantics for DriverHealthChecker | Multiple Magic Mouse HID devices share same Vendor ID — if any one is unbound, the whole device is in broken state | active |
| D-003 | 2026-04-21 | Do NOT use ReportDescriptor as binding signal (H-001) | Too many false negatives — descriptor can be null even when driver is bound | active |
| D-014 | 2026-04-28 | M12 clean-room KMDF filter driver selected over shipping MU driver as production | APPROVED. Clean IP, no EULA shipping risk, no trial-expiry dependency, no userland maintenance debt. MU trial expired (app dead); shipping MU's binary would require ongoing license compliance with no upgrade path. M12 is ~50 LOC translation logic + ~400 LOC scaffold, estimated 4-8 hr agentic with Ghidra reference. See `docs/M12-MAGIC-UTILITIES-REFERENCE-PLAN.md`. | active |
| D-015 | 2026-04-28 | v1 Magic Mouse (PID 0x030D) adopted as known-good control for M12 regression validation | APPROVED. v1 firmware backs Feature 0x47 natively; v1 + v3 HID descriptors are byte-identical post-filter. M12 INF must bind both PIDs. v1 must produce `OK battery=N% (Feature 0x47)` on every M12 build iteration before v3 is tested. v1 regression failure = broken pass-through path; diagnose independently from v3 translation failure. | active |
| D-016 | 2026-04-28 | M12 architecture = pure kernel filter, ~300-500 LOC, no userland split | APPROVED 2026-04-28 (Session 12). Architecture: replicate MU's Mode A descriptor mutation + implement in-IRP scroll/battery translation derived from Linux `hid-magicmouse.c` reference + Ghidra analysis of `MagicMouse.sys`. No userland service dependency. Empirical basis: H-013 CONFIRMED FAIL — kernel-only MU install (trial-expired userland dead) breaks scroll and hides battery, proving userland-split design is unnecessary complexity that creates trial-expiry and maintenance risk. | active |

