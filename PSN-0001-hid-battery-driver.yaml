# PSN-0001: Magic Mouse HID Battery Reader — Windows 11 Driver Binding

## Problem Statement

Apple Magic Mouse v2/2024 on Windows 11 requires the `AppleWirelessMouse64` HID driver to be bound to read battery via HID Input Report `0x90` (byte[2] = battery %). The driver doesn't reliably bind after suspend-resume or after Windows updates. PRD-184 delivers the core battery reader, but GitHub Issues #2, #3, #4 track ongoing driver binding reliability problems.

## Current Working Theory

The v3 mouse battery problem is a **HidBth runtime descriptor cache** issue, not a filter binding issue. HidBth serves one of two cached descriptor variants for the v3 BTHENUM HID PDO, with `applewirelessmouse` filter on the stack in BOTH cases:

- **Descriptor A (split):** vendor 0xFF00 TLC enumerated as `…&col02#…` child PDO. `HidD_GetInputReport(0x90)` byte[2] returns battery %. Empirically read 96 times on 2026-04-27 06:04-19:43.
- **Descriptor B (unified):** COL02 stripped, single Mouse TLC declares phantom Feature 0x47 with UP=0x06/U=0x20. `HidD_GetFeature(0x47)` returns err=87 because the device does not back that ReportID. Empirically: ~588 probe attempts across 6 channels (DEVPKEY, WMI, IOCTL 0x800-0x830, HidD_GetFeature/GetInputReport every ReportID 0x01-0xFE, orphan COL02 direct open, Battery class) → 0 hits.

Registry on `Enum\BTHENUM\…\Device Parameters` is byte-identical between A and B states. The state difference lives in HidBth's kernel-pool descriptor cache, not in any registry value. PnP recycle (Disable+Enable BTHENUM HID PDO) CAN restore Descriptor A but is non-deterministic — both A and B can come out the other side. A DSM (DeviceSetupManager) property-write event at 2026-04-27 19:50:53 correlates with the only observed A→B flip; mechanism unconfirmed.

Tray code is correct (`splitVendorBattery` + `unifiedAppleBattery` paths both implemented and switch on runtime descriptor caps). The bug is keeping the device in Descriptor A.

